<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://api.openweathermap.org">
    <link rel="preconnect" href="https://openweathermap.org">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Insights — AI Smart Agriculture</title>
    <link rel="stylesheet" href="/static/css/bundle.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <main class="main-content">
        <div class="content-area">
            <h1 class="mb-3" style="color: var(--dark-green);"><i class="fas fa-cloud-sun-rain"></i> <span data-i18n="weather.title">Weather Insights</span></h1>
            <p class="mb-4" style="color: var(--gray-600);" data-i18n="weather.desc">Check real-time agricultural weather forecasts for your farm location.</p>

            <div id="alert-container"></div>

            <div class="card p-4 mb-4">
                <form id="weather-form" style="display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap;">
                    <div class="form-group" style="flex: 1; min-width: 250px; margin-bottom: 0;">
                        <label class="form-label" data-i18n="weather.city">City Name</label>
                        <input type="text" id="city-input" class="form-input" placeholder="e.g. Bangalore" required>
                    </div>
                    <button type="submit" class="btn btn-primary" id="btn-search">
                        <i class="fas fa-search"></i> <span data-i18n="weather.search">Search</span>
                    </button>
                    <button type="button" class="btn btn-secondary" id="btn-detect">
                        <i class="fas fa-location-arrow"></i> <span data-i18n="weather.detect">Use My Location</span>
                    </button>
                </form>
            </div>

            <div id="loading-spinner" style="display: none; text-align: center; padding: 40px;">
                <i class="fas fa-spinner fa-spin fa-3x" style="color: var(--primary-green);"></i>
                <p class="mt-3" style="color: var(--gray-600);">Fetching latest weather data...</p>
            </div>

            <div id="weather-result" style="display: none;">
                <h3 class="mb-3" style="color: var(--dark-green);" id="location-name"></h3>
                
                <div class="dashboard-grid">
                    <div class="feature-card" style="text-align: center;">
                        <div class="feature-icon" style="background: rgba(52, 152, 219, 0.1); color: #3498db;">
                            <i class="fas fa-thermometer-half"></i>
                        </div>
                        <h4 style="margin: 10px 0 5px;">Temperature</h4>
                        <p style="font-size: 2rem; font-weight: bold; color: var(--dark-green);" id="w-temp">-- °C</p>
                    </div>
                    
                    <div class="feature-card" style="text-align: center;">
                        <div class="feature-icon" style="background: rgba(46, 204, 113, 0.1); color: var(--secondary-green);">
                            <i class="fas fa-tint"></i>
                        </div>
                        <h4 style="margin: 10px 0 5px;">Humidity</h4>
                        <p style="font-size: 2rem; font-weight: bold; color: var(--dark-green);" id="w-humidity">-- %</p>
                    </div>
                    
                    <div class="feature-card" style="text-align: center;">
                        <div class="feature-icon" style="background: rgba(155, 89, 182, 0.1); color: #9b59b6;">
                            <i class="fas fa-cloud-rain"></i>
                        </div>
                        <h4 style="margin: 10px 0 5px;">Rainfall</h4>
                        <p style="font-size: 2rem; font-weight: bold; color: var(--dark-green);" id="w-rainfall">-- mm</p>
                    </div>
                    
                    <div class="feature-card" style="text-align: center;">
                        <div class="feature-icon" style="background: rgba(241, 196, 15, 0.1); color: #f1c40f;">
                            <i class="fas fa-sun"></i>
                        </div>
                        <h4 style="margin: 10px 0 5px;">Conditions</h4>
                        <p style="font-size: 1.5rem; font-weight: bold; color: var(--dark-green);" id="w-desc">--</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

                    <script src="/static/js/bundle.min.js"></script>
</body>
</html>
