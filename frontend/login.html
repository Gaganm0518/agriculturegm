<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://api.openweathermap.org">
    <link rel="preconnect" href="https://openweathermap.org">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to AI Smart Agriculture - Intelligent farming solutions">
    <title>AI Smart Agriculture — Login</title>
    <link rel="stylesheet" href="/static/css/bundle.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo" style="margin-bottom: var(--spacing-lg);">
                <i class="fas fa-seedling"></i>
                <h1 style="font-size: var(--font-size-xl);">Welcome Back</h1>
                <p>Login to your account</p>
            </div>
            
            <div id="alert-container"></div>

            <form id="login-form" novalidate>
                <div class="form-group" style="text-align: left;">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="Enter your email" required>
                    <div class="form-error" id="email-error"></div>
                </div>

                <div class="form-group" style="text-align: left;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-xs);">
                        <label for="password" class="form-label" style="margin-bottom: 0;">Password</label>
                        <a href="#" style="font-size: var(--font-size-xs);">Forgot Password?</a>
                    </div>
                    <div style="position: relative;">
                        <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required>
                        <i class="fas fa-eye" id="toggle-password" style="position: absolute; right: 15px; top: 12px; cursor: pointer; color: var(--gray-500);"></i>
                    </div>
                    <div class="form-error" id="password-error"></div>
                </div>

                <div class="form-group" style="text-align: left; display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="remember" name="remember" style="accent-color: var(--primary-green);">
                    <label for="remember" style="font-size: var(--font-size-sm); color: var(--gray-700); cursor: pointer;">Remember Me</label>
                </div>

                <button type="submit" class="btn btn-primary btn-block mt-2" id="submit-btn">
                    <span id="btn-text">Log In</span>
                    <div class="loading-spinner" id="btn-spinner" style="display: none; width: 16px; height: 16px; border-width: 2px;"></div>
                </button>
            </form>

            <div class="mt-3" style="font-size: var(--font-size-sm); color: var(--gray-600);">
                Don't have an account? <a href="/register.html" style="font-weight: 600;">Register here</a>
            </div>
        </div>
    </div>

                <script src="/static/js/bundle.min.js"></script>
</body>
</html>
