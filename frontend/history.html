<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://api.openweathermap.org">
    <link rel="preconnect" href="https://openweathermap.org">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Agriculture — <span data-i18n="hist.title">Prediction History</span></title>
    <link rel="stylesheet" href="/static/css/bundle.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Filter Tabs */
        .filter-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .filter-tab {
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            border: 2px solid var(--gray-200);
            background: white;
            color: var(--gray-600);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-tab:hover { border-color: var(--primary-green); color: var(--primary-green); }
        .filter-tab.active {
            background: var(--primary-green);
            color: white;
            border-color: var(--primary-green);
        }

        /* History Card */
        .history-list { display: flex; flex-direction: column; gap: 1rem; }
        .history-card {
            background: white;
            border-radius: var(--border-radius);
            padding: 1.25rem 1.5rem;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: box-shadow 0.2s, transform 0.15s;
        }
        .history-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        .history-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .history-body { flex: 1; min-width: 0; }
        .history-type {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 4px;
        }
        .history-summary {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 2px;
        }
        .history-date {
            font-size: 0.8rem;
            color: var(--gray-500);
        }
        .history-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .btn-icon {
            width: 36px; height: 36px;
            border-radius: 8px;
            border: 1px solid var(--gray-200);
            background: white;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--gray-500);
            font-size: 0.85rem;
        }
        .btn-icon:hover { border-color: var(--primary-green); color: var(--primary-green); }
        .btn-icon.delete:hover { border-color: #dc2626; color: #dc2626; }

        /* Pagination */
        .pagination-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 2rem;
        }
        .page-btn {
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid var(--gray-200);
            background: white;
            color: var(--gray-600);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .page-btn:hover { border-color: var(--primary-green); color: var(--primary-green); }
        .page-btn.active { background: var(--primary-green); color: white; border-color: var(--primary-green); }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            display: none;
        }
        .empty-state i {
            font-size: 5rem;
            color: var(--gray-300);
            margin-bottom: 1rem;
        }
        .empty-state h3 { color: var(--gray-500); margin-bottom: 0.5rem; }
        .empty-state p { color: var(--gray-400); }

        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-overlay.visible { display: flex; }
        .modal-box {
            background: white;
            border-radius: 16px;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.5rem;
        }
        .modal-header h3 { font-size: 1.25rem; color: var(--dark-green); }
        .modal-close {
            width: 32px; height: 32px;
            border-radius: 50%;
            border: none;
            background: var(--gray-100);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; color: var(--gray-500);
        }
        .modal-close:hover { background: var(--gray-200); }
        .detail-row-modal {
            display: flex;
            justify-content: space-between;
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--gray-100);
            font-size: 0.9rem;
        }
        .detail-row-modal:last-child { border-bottom: none; }
        .detail-label-m { color: var(--gray-500); font-weight: 500; }
        .detail-value-m { font-weight: 600; color: var(--text-dark); text-align: right; max-width: 60%; word-break: break-word; }

        /* Top actions bar */
        .top-actions {
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 12px; margin-bottom: 1.5rem;
        }
        .export-btn {
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            border: 2px solid var(--primary-green);
            background: white;
            color: var(--primary-green);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .export-btn:hover { background: var(--primary-green); color: white; }

        /* Loading */
        .loading-state {
            padding: 1rem 0;
            display: none;
        }
        .loading-state i { font-size: 2rem; color: var(--primary-green); }

        @media (max-width: 600px) {
            .history-card { flex-direction: column; text-align: center; }
            .history-actions { margin-top: 0.5rem; }
        }
    </style>
</head>
<body class="dashboard-layout">

    

    <main class="main-content">
        

        <div class="content-area">
            <div class="top-actions">
                <div class="filter-bar" id="filter-bar">
                    <button class="filter-tab active" data-type="all">All</button>
                    <button class="filter-tab" data-type="crop"><i class="fas fa-leaf"></i> Crop</button>
                    <button class="filter-tab" data-type="disease"><i class="fas fa-bug"></i> Disease</button>
                    <button class="filter-tab" data-type="yield"><i class="fas fa-chart-line"></i> Yield</button>
                    <button class="filter-tab" data-type="fertilizer"><i class="fas fa-vial"></i> Fertilizer</button>
                </div>
                <button class="export-btn" id="export-btn">
                    <i class="fas fa-download"></i> <span data-i18n="hist.btn.export">Export CSV</span>
                </button>
            </div>

            <div class="loading-state" id="loading-state">
                <div class="skeleton skeleton-card"></div>
                <div class="skeleton skeleton-card"></div>
                <div class="skeleton skeleton-card"></div>
            </div>

            <div class="history-list" id="history-list"></div>

            <div class="empty-state" id="empty-state">
                <i class="fas fa-inbox"></i>
                <h3>No Predictions Yet</h3>
                <p>Your AI analysis history will appear here once you start using our tools.</p>
                <a href="/dashboard.html" class="btn btn-primary" style="margin-top: 1rem;">
                    <i class="fas fa-arrow-left"></i> Go to Dashboard
                </a>
            </div>

            <div class="pagination-bar" id="pagination-bar"></div>
        </div>
    </main>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="detail-modal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modal-title">Prediction Details</h3>
                <button class="modal-close" id="modal-close"><i class="fas fa-times"></i></button>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

                    <script src="/static/js/bundle.min.js"></script>
</body>
</html>
